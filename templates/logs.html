{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>Application Logs</h2>
    <p style="opacity: 0.8; font-size: 0.9rem; margin-bottom: 1rem;">
        View <code>logs/do-rag.log</code> — Filter by level or subsystem (admin-ui, indexer, mcp-server, config, containers, system).
    </p>

    <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; margin-bottom: 1rem;">
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <label>Level:</label>
            <select id="filter-level">
                <option value="">All</option>
                <option value="ERROR">ERROR</option>
                <option value="WARNING">WARNING</option>
                <option value="INFO">INFO</option>
                <option value="DEBUG">DEBUG</option>
            </select>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <label>Subsystem:</label>
            <select id="filter-subsystem">
                <option value="">All</option>
            </select>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center; flex: 1; min-width: 200px;">
            <label>Search:</label>
            <input type="text" id="filter-search" placeholder="Filter by text..." style="margin-bottom: 0;">
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <label>Max size (KB):</label>
            <input type="number" id="max-log-size" min="64" max="102400" step="64" style="width: 6rem; margin-bottom: 0;" title="Logs truncate automatically when exceeding this size">
            <button type="button" id="btn-save-size" onclick="saveMaxLogSize()">Save</button>
        </div>
        <div style="display: flex; gap: 0.5rem;">
            <button type="button" id="btn-apply" onclick="loadLogs()">Apply</button>
            <button type="button" id="btn-follow" onclick="toggleFollow()">Follow (stream)</button>
            <button type="button" id="btn-refresh" onclick="loadLogs()">Refresh</button>
            <button type="button" id="btn-clear" onclick="clearLogs()" style="background: var(--danger);">Clear All Logs</button>
        </div>
    </div>

    <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 0.5rem; font-size: 0.85rem; opacity: 0.8;">
        <span id="log-stats">—</span>
        <span id="log-status"></span>
    </div>

    <div id="log-container"
        style="background: #111; border: 1px solid var(--border); border-radius: 4px; padding: 1rem; font-family: 'Monaco', 'Menlo', 'Consolas', monospace; font-size: 0.8rem; line-height: 1.4; max-height: 60vh; overflow-y: auto; white-space: pre-wrap; word-break: break-all;">
        <div id="log-content">Loading...</div>
    </div>

    <div style="display: flex; gap: 1rem; margin-top: 0.75rem;">
        <button type="button" id="btn-load-more" onclick="loadOlder()" style="background: #444;">Load older</button>
        <button type="button" id="btn-bottom" onclick="scrollToBottom()">Jump to bottom</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const PAGE_SIZE = 500;
    let followInterval = null;
    let lastOffset = 0;
    let totalLines = 0;
    let isFollowing = false;

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    function highlightLine(line, search) {
        if (!search) return escapeHtml(line);
        const idx = line.toLowerCase().indexOf(search.toLowerCase());
        if (idx === -1) return escapeHtml(line);
        const before = line.slice(0, idx);
        const match = line.slice(idx, idx + search.length);
        const after = line.slice(idx + search.length);
        return escapeHtml(before) + '<mark style="background:#664400;padding:0 2px;">' + escapeHtml(match) + '</mark>' + escapeHtml(after);
    }

    function levelClass(level) {
        if (level.includes('ERROR')) return 'log-error';
        if (level.includes('WARNING')) return 'log-warning';
        return '';
    }

    function renderLines(lines, search, prepend = false) {
        const container = document.getElementById('log-content');
        const fragment = document.createDocumentFragment();
        for (const line of lines) {
            const div = document.createElement('div');
            div.className = 'log-line';
            const m = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}) \| (\w+)\s*\|/);
            if (m) {
                const level = m[2];
                div.className += ' ' + levelClass(level);
            }
            div.innerHTML = highlightLine(line, search);
            fragment.appendChild(div);
        }
        if (prepend) {
            container.insertBefore(fragment, container.firstChild);
        } else {
            container.appendChild(fragment);
        }
    }

    function populateSubsystems(subsystems) {
        const sel = document.getElementById('filter-subsystem');
        const current = sel.value;
        sel.innerHTML = '<option value="">All</option>';
        (subsystems || []).forEach(s => {
            const opt = document.createElement('option');
            opt.value = s;
            opt.textContent = s;
            if (s === current) opt.selected = true;
            sel.appendChild(opt);
        });
    }

    async function loadConfig() {
        try {
            const res = await fetch('/api/config');
            if (res.ok) {
                const cfg = await res.json();
                const inp = document.getElementById('max-log-size');
                if (inp) inp.value = cfg.LOG_MAX_SIZE_KB ?? 1024;
            }
        } catch (e) {
            console.error('Failed to load config', e);
        }
    }

    async function saveMaxLogSize() {
        const inp = document.getElementById('max-log-size');
        const kb = parseInt(inp?.value, 10);
        if (isNaN(kb) || kb < 64) {
            document.getElementById('log-status').textContent = 'Enter a valid size (min 64 KB)';
            return;
        }
        try {
            const res = await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ LOG_MAX_SIZE_KB: kb })
            });
            if (res.ok) {
                document.getElementById('log-status').textContent = 'Max log size saved.';
                setTimeout(() => { document.getElementById('log-status').textContent = ''; }, 2000);
            } else {
                document.getElementById('log-status').textContent = 'Failed to save.';
            }
        } catch (e) {
            document.getElementById('log-status').textContent = 'Error: ' + e.message;
        }
    }

    async function clearLogs() {
        if (!confirm('Clear all logs? This cannot be undone.')) return;
        try {
            const res = await fetch('/api/logs/clear', { method: 'POST' });
            if (res.ok) {
                loadLogs();
                document.getElementById('log-status').textContent = 'Logs cleared.';
                setTimeout(() => { document.getElementById('log-status').textContent = ''; }, 2000);
            } else {
                const data = await res.json().catch(() => ({}));
                document.getElementById('log-status').textContent = data.message || 'Failed to clear logs.';
            }
        } catch (e) {
            document.getElementById('log-status').textContent = 'Error: ' + e.message;
        }
    }

    async function loadLogs(appendOlder = false) {
        const level = document.getElementById('filter-level').value;
        const subsystem = document.getElementById('filter-subsystem').value;
        const search = document.getElementById('filter-search').value.trim();
        const params = new URLSearchParams();
        params.set('limit', PAGE_SIZE);
        if (level) params.set('level', level);
        if (subsystem) params.set('subsystem', subsystem);
        if (search) params.set('search', search);
        if (appendOlder && lastOffset > 0) {
            params.set('offset', lastOffset);
        } else if (!appendOlder) {
            lastOffset = 0;
        }

        try {
            document.getElementById('log-status').textContent = 'Loading...';
            const res = await fetch('/api/logs?' + params);
            if (!res.ok) {
                const text = await res.text();
                document.getElementById('log-content').innerHTML = '<div style="color:var(--danger);">' + escapeHtml(text || 'Log file not found') + '</div>';
                document.getElementById('log-stats').textContent = '—';
                return;
            }
            const data = await res.json();

            if (!appendOlder) {
                document.getElementById('log-content').innerHTML = '';
            }
            if (data.lines && data.lines.length > 0) {
                renderLines(data.lines, search, appendOlder);
            } else if (!appendOlder) {
                document.getElementById('log-content').innerHTML = '<div style="opacity:0.6;">No log entries match the current filters.</div>';
            }

            lastOffset = data.next_offset ?? 0;
            totalLines = data.total_lines ?? data.lines?.length ?? 0;
            if (data.subsystems) populateSubsystems(data.subsystems);
            document.getElementById('log-stats').textContent = `Showing ${data.lines?.length || 0} lines` + (data.total_lines ? ` (${data.total_lines} total)` : '');
            document.getElementById('btn-load-more').style.display = (data.has_more ? 'inline-block' : 'none');
            document.getElementById('log-status').textContent = '';
        } catch (e) {
            document.getElementById('log-status').textContent = 'Error: ' + e.message;
            document.getElementById('log-content').innerHTML = '<div style="color:var(--danger);">Failed to load logs.</div>';
        }
    }

    async function loadOlder() {
        await loadLogs(true);
    }

    function scrollToBottom() {
        const container = document.getElementById('log-container');
        container.scrollTop = container.scrollHeight;
    }

    function toggleFollow() {
        isFollowing = !isFollowing;
        const btn = document.getElementById('btn-follow');
        btn.textContent = isFollowing ? 'Stop follow' : 'Follow (stream)';
        btn.style.background = isFollowing ? 'var(--danger)' : 'var(--accent)';

        if (followInterval) {
            clearInterval(followInterval);
            followInterval = null;
        }
        if (isFollowing) {
            followInterval = setInterval(pollNewLines, 2000);
        }
    }

    async function pollNewLines() {
        const level = document.getElementById('filter-level').value;
        const subsystem = document.getElementById('filter-subsystem').value;
        const search = document.getElementById('filter-search').value.trim();
        const params = new URLSearchParams();
        params.set('limit', 300);
        params.set('tail', '300');
        if (level) params.set('level', level);
        if (subsystem) params.set('subsystem', subsystem);
        if (search) params.set('search', search);

        try {
            const res = await fetch('/api/logs?' + params);
            if (!res.ok) return;
            const data = await res.json();
            if (data.lines && data.lines.length > 0) {
                const container = document.getElementById('log-content');
                const wasAtBottom = container.parentElement.scrollHeight - container.parentElement.scrollTop - container.parentElement.clientHeight < 50;
                document.getElementById('log-content').innerHTML = '';
                renderLines(data.lines, search);
                if (wasAtBottom) scrollToBottom();
            }
        } catch (e) {
            console.error('Poll failed', e);
        }
    }

    loadConfig();
    loadLogs();
</script>
<style>
    .log-line { padding: 0.1rem 0; border-bottom: 1px solid transparent; }
    .log-line.log-error { color: #e24a4a; }
    .log-line.log-warning { color: #e2a44a; }
</style>
{% endblock %}
