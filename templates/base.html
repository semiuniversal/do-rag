<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do-RAG Admin</title>
    <style>
        :root {
            --bg: #1a1a1a;
            --surface: #2d2d2d;
            --text: #e0e0e0;
            --accent: #4a90e2;
            --danger: #e24a4a;
            --border: #404040;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }

        nav {
            background: var(--surface);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        nav h1 {
            margin: 0;
            font-size: 1.2rem;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            margin-left: 1.5rem;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        nav a:hover,
        nav a.active {
            opacity: 1;
            color: var(--accent);
        }

        main {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--surface);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
        }

        h2 {
            margin-top: 0;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.5rem;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        button:hover {
            opacity: 0.9;
        }

        input:not([type="radio"]):not([type="checkbox"]),
        select,
        textarea {
            background: #111;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 1rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            opacity: 0.7;
            font-weight: normal;
        }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            background: #444;
            border-radius: 12px;
            font-size: 0.8rem;
        }
    </style>
</head>

<body>
    <nav>
        <h1>Do-RAG Admin</h1>
        <div>
            <a href="/">Dashboard</a>
            <a href="/config">Configuration</a>
        </div>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        // Simple helper to fetch JSON
        async function api(url, method = "GET", body = null) {
            const opts = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) opts.body = JSON.stringify(body);
            const res = await fetch(url, opts);
            return res.json();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
