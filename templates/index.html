{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2>System Status</h2>
    <div style="display: flex; gap: 2rem;">
        <div>
            <h3>Total Indexed Files</h3>
            <div id="total-count" style="font-size: 3rem; font-weight: bold; color: var(--accent);">--</div>
        </div>
        <div>
            <h3>Status</h3>
            <div id="indexer-status">Checking...</div>
        </div>
    </div>
</div>

<div class="card">
    <h2>Indexed Files</h2>
    <input type="text" id="filter" placeholder="Filter files..." onkeyup="renderFiles()">
    <table id="file-table">
        <thead>
            <tr>
                <th>Path</th>
                <th>Chunks</th>
                <th>Last Modified</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>
{% endblock %}

{% block scripts %}
<script>
    let allFiles = [];

    async function loadStatus() {
        const data = await api('/api/status');
        document.getElementById('total-count').innerText = data.total_files;
        document.getElementById('indexer-status').innerText = data.indexer_running ? "Running" : "Idle";

        allFiles = data.indexed_files;
        renderFiles();
    }

    function renderFiles() {
        const filter = document.getElementById('filter').value.toLowerCase();
        const tbody = document.querySelector('#file-table tbody');
        tbody.innerHTML = '';

        const filtered = allFiles.filter(f => f.path.toLowerCase().includes(filter));
        const limit = 50; // Pagination implied for now

        filtered.slice(0, limit).forEach(f => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
            <td>${f.path}</td>
            <td><span class="badge">${f.chunks}</span></td>
            <td>${new Date(f.mtime * 1000).toLocaleString()}</td>
        `;
            tbody.appendChild(tr);
        });

        if (filtered.length > limit) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td colspan="3" style="text-align: center; opacity: 0.5;">...and ${filtered.length - limit} more</td>`;
            tbody.appendChild(tr);
        }
    }

    loadStatus();
    // Auto-refresh every 10s
    setInterval(loadStatus, 10000);
</script>
{% endblock %}
